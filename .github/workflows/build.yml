name: Build modern macOS bundle

on:
  push:
    branches: [main, macos27-port]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build universal ad-hoc validation bundle
        env:
          CODE_SIGN_IDENTITY: '-'
          MACOSX_DEPLOYMENT_TARGET: '15.0'
        run: bash Scripts/build-macos27.sh

      - name: Preserve the uninstalled bundle
        uses: actions/upload-artifact@v4
        with:
          name: NoMADLoginAD-modern-macos
          path: build/NoMADLoginAD-DerivedData/Build/Products/Release/NoMADLoginAD.bundle
          if-no-files-found: error
